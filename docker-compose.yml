services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: todo
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo_password
    # No public port exposure; accessible only to other services in this compose network.
    # If you need local admin access, temporarily enable and bind to 127.0.0.1:
    # ports:
    #   - "127.0.0.1:5432:5432"
    volumes:
      - todo_pg:/var/lib/postgresql/data

  bot:
    image: node:22-alpine
    working_dir: /app
    depends_on:
      - db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # inside docker network
      DATABASE_URL: postgresql://todo:todo_password@db:5432/todo?schema=public
    volumes:
      - ./:/app
    command: sh -lc "npm ci && npx prisma generate && npx prisma db push && npm run dev"

volumes:
  todo_pg:
